version: '3.8'

services:
  prompt-guard:
    build: .
    container_name: prompt-guard
    ports:
      - "8000:8000"  # FastAPI backend
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-demo}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ATTACKS_DB_PATH=/app/database/attacks.db
    volumes:
      - ./models:/app/models  # Mount models directory
      - attacks_data:/app/database  # Persistent attack database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  attacks_data:
    driver: local
